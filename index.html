<!doctype html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Водяник Ангеліна — психолог</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
background:#0f0f0f;
color:#e8e4df;
font-family:Montserrat;
}

.font-serif{
font-family:"Cormorant Garamond";
}

.primary{
color:#c9a86c;
}

.btn{
border:1px solid #c9a86c;
padding:12px 26px;
transition:.3s;
}

.btn:hover{
background:#c9a86c;
color:black;
}

.page{
display:none;
opacity:0;
transition:.6s;
}

.page.active{
display:block;
opacity:1;
}

.hero-bg{
position:absolute;
inset:0;
background:url(photo_2026-02-25_18-20-26.jpg) center/cover;
filter:blur(8px) brightness(.35);
transform:scale(1.1);
}

.service-card{
background:#1a1a1a;
padding:30px;
border-radius:10px;
transition:.35s;
border:1px solid rgba(201,168,108,.15);
cursor:pointer;
}

.service-card:hover{
transform:translateY(-6px);
border-color:#c9a86c;
}

.service-card.active{
border-color:#c9a86c;
box-shadow:0 20px 40px rgba(201,168,108,.3);
}

.service-details{
max-height:0;
overflow:hidden;
transition:all .4s ease;
}

.service-card.active .service-details{
max-height:500px;
margin-top:20px;
padding-top:20px;
border-top:1px solid rgba(201,168,108,.2);
}

.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

.gallery img{
border-radius:10px;
transition:.4s;
}

.gallery img:hover{
transform:scale(1.06);
}

.float{
position:fixed;
right:20px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.float a{
background:#1a1a1a;
border:1px solid #c9a86c;
padding:10px 16px;
font-size:12px;
}

@media(max-width:768px){

.hero-title{
font-size:34px;
line-height:1.2;
}

}

</style>
</head>

<body>

<!-- NAV -->

<nav class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur border-b border-white/5">

<div class="max-w-6xl mx-auto flex justify-between items-center h-20 px-6">

<div onclick="navigateTo('home')" class="font-serif text-xl primary cursor-pointer">
Водяник Ангеліна
</div>

<div class="hidden md:flex gap-8 text-sm">

<div onclick="navigateTo('home')" class="cursor-pointer">Головна</div>
<div onclick="navigateTo('about')" class="cursor-pointer">Про мене</div>
<div onclick="navigateTo('services')" class="cursor-pointer">Послуги</div>
<div onclick="navigateTo('gallery')" class="cursor-pointer">Галерея</div>
<div onclick="navigateTo('contact')" class="cursor-pointer">Контакти</div>

</div>
</div>
</nav>


<!-- HOME -->

<div id="page-home" class="page active">

<section class="min-h-screen flex items-center justify-center text-center relative px-6">

<div class="hero-bg"></div>

<div class="relative max-w-3xl">

<p class="uppercase tracking-[0.4em] text-sm primary mb-4">
Психолог • Recovery Specialist
</p>

<h1 class="font-serif text-6xl hero-title mb-6">
Робота з тривогою,
<span class="primary">ОКР та залежностями</span>
</h1>

<p class="opacity-80 mb-10 text-lg">
Зміна нейронних зв'язків через експозицію та десенсибілізацію
</p>

<div class="flex justify-center gap-4 flex-wrap">

<button onclick="navigateTo('contact')" class="btn">
Записатися
</button>

<button onclick="navigateTo('services')" class="btn">
Послуги
</button>

</div>
</div>
</section>
</div>


<!-- GALLERY -->

<div id="page-gallery" class="page">

<section class="pt-32 pb-20 px-6 max-w-6xl mx-auto">

<h2 class="font-serif text-5xl text-center mb-16">
Галерея
</h2>

<div class="grid md:grid-cols-3 gap-8 gallery">

<img src="photo1.jpg" class="fade">
<img src="photo2.jpg" class="fade">
<img src="photo3.jpg" class="fade">

<img src="photo4.jpg" class="fade">
<img src="photo5.jpg" class="fade">
<img src="photo6.jpg" class="fade">

</div>

</section>
</div>


<!-- CONTACT -->

<div id="page-contact" class="page">

<section class="pt-32 pb-20 text-center px-6">

<h2 class="font-serif text-5xl mb-10">
Контакти
</h2>

<p class="mb-4 text-xl">
WhatsApp: <span class="primary font-semibold">+380986528383</span>
</p>

<div class="flex flex-wrap justify-center gap-4 mb-8 max-w-md mx-auto">

<a href="https://www.instagram.com/psixologgelyya" target="_blank" class="btn flex-1 min-w-[140px] justify-center">
Instagram
</a>

<a href="https://www.tiktok.com/@angelina_vodianik?_r=1&_t=ZS-94fIU5SM7rk" target="_blank" class="btn flex-1 min-w-[140px] justify-center">
TikTok
</a>

<a href="https://wa.me/380986528383" class="btn flex-1 min-w-[140px] justify-center">
WhatsApp
</a>

</div>

</section>
</div>


<script>

function navigateTo(page){
document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})
document.getElementById("page-"+page).classList.add("active")
window.scrollTo({top:0,behavior:"smooth"})
}

function toggleService(card){
card.classList.toggle('active')
}

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show")
}
})
})

document.querySelectorAll(".fade").forEach(el=>{
observer.observe(el)
})

</script>

</body>
</html>
